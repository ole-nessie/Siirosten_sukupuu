<!DOCTYPE html>
<html lang="fi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sukupuu-sovellus - Siironen & Tiainen perheen sukupuu">
  <title>Sukupuu – Siironen & Tiainen</title>
  <link rel="stylesheet" href="index.css?v=5">
</head>

<body>
  <div class="app" id="app">
    <!-- Header -->
    <header>
      <button class="btn md-hidden" id="btnToggleLeft" title="Valikko" style="margin-right:8px; display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Sukupuu
      </div>
      <div class="toolbar">
        <button class="btn" id="btnAddPerson" title="Lisää henkilö">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Lisää henkilö
        </button>
        <div class="toolbar-separator"></div>
        <button class="btn" id="btnOpenFile" title="Avaa tiedosto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          Avaa
        </button>
        <button class="btn btn-success" id="btnSaveXml" title="Tallenna tiedostoon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Tallenna
        </button>
        <button class="btn" id="btnExportXml" title="Vie kopio toiseen sijaintiin">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Vie kopio
        </button>
        <div class="toolbar-separator"></div>
        <button class="btn btn-active-view" id="btnViewNormal" title="Normaali sukupuunäkymä">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          Normaali
        </button>
        <button class="btn" id="btnViewCompact" title="Tiivis sukupuunäkymä">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="6" y1="10" x2="21" y2="10" />
            <line x1="6" y1="14" x2="21" y2="14" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
          Tiivis
        </button>
        <div class="toolbar-separator"></div>
        <span class="current-file" id="currentFileName" title="Ei tiedostoa auki">Ei tiedostoa auki</span>
      </div>
    </header>

    <!-- Left Panel -->
    <div class="panel-left">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="searchInput" placeholder="Hae henkilöä nimellä...">
      </div>
      <div class="person-count" id="personCount">0 henkilöä</div>
      <div class="person-list" id="personList"></div>
    </div>

    <!-- Tree Area -->
    <div class="tree-area" id="treeArea">
      <div class="grid-bg"></div>
      <div class="tree-container" id="treeContainer">
        <div class="tree-canvas" id="treeCanvas">
          <svg class="tree-lines" id="treeLines"></svg>
        </div>
      </div>
      <div class="empty-state" id="treeEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <p>Valitse henkilö vasemmalta nähdäksesi sukupuun</p>
      </div>

      <div class="zoom-controls">
        <button id="btnZoomIn" title="Lähennä">+</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <button id="btnZoomOut" title="Loitonna">−</button>
        <button id="btnZoomFit" title="Sovita" style="font-size:14px;margin-top:4px;">⊡</button>
      </div>
    </div>

    <!-- Right Panel (Detail) -->
    <div class="panel-right" id="panelRight">
      <div class="empty-state" id="detailEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
        <p>Valitse henkilö nähdäksesi tiedot</p>
      </div>
      <div id="detailView" style="display:none;flex-direction:column;height:100%;">
        <div class="detail-header">
          <div class="detail-avatar" id="detailAvatar"></div>
          <div class="detail-info">
            <div class="detail-name" id="detailName"></div>
            <div class="detail-id" id="detailId"></div>
          </div>
        </div>
        <div class="detail-content" id="detailContent"></div>
        <div class="detail-actions">
          <button class="btn btn-primary btn-sm" id="btnEditPerson">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            Muokkaa
          </button>
          <button class="btn btn-sm" id="btnShowTree">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
            </svg>
            Näytä puu
          </button>
          <button class="btn btn-sm btn-danger" id="btnDeletePerson">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
            Poista
          </button>
        </div>
      </div>
    </div>
    
    <!-- Mobile Overlay for Sidebars -->
    <div class="mobile-overlay" id="sidebarOverlay"></div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Lisää henkilö</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label for="formGivenname">Etunimet</label>
            <input type="text" id="formGivenname" placeholder="esim. Matti* Kalevi">
          </div>
          <div class="form-group">
            <label for="formSurname">Sukunimi</label>
            <input type="text" id="formSurname" placeholder="esim. Siironen">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formSex">Sukupuoli</label>
            <select id="formSex">
              <option value="M">Mies</option>
              <option value="F">Nainen</option>
            </select>
          </div>
          <div class="form-group">
            <label for="formOccu">Ammatti</label>
            <input type="text" id="formOccu" placeholder="esim. Insinööri">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formBirthDate">Syntymäaika</label>
            <input type="text" id="formBirthDate" placeholder="VVVVKKPP, esim. 19830115">
          </div>
          <div class="form-group">
            <label for="formBirthPlace">Syntymäpaikka</label>
            <input type="text" id="formBirthPlace" placeholder="esim. Kokkola">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formDeathDate">Kuolinaika</label>
            <input type="text" id="formDeathDate" placeholder="VVVVKKPP (tyhjä jos elossa)">
          </div>
          <div class="form-group">
            <label for="formDeathPlace">Kuolinpaikka</label>
            <input type="text" id="formDeathPlace" placeholder="">
          </div>
        </div>
        <div class="form-group">
          <label for="formEduc">Koulutus</label>
          <input type="text" id="formEduc" placeholder="esim. Diplomi-insinööri">
        </div>
        <div class="form-group">
          <label for="formMarriedNames">Muut nimet</label>
          <input type="text" id="formMarriedNames" placeholder="esim. Minna Siironen; Minna Björkbacka (syntymänimi)">
        </div>
        <div class="form-group">
          <label>Tarina & Lisätiedot</label>
          <div id="formNotesContainer" class="dynamic-list"></div>
          <button type="button" class="btn btn-sm" id="btnAddNote" style="margin-top:4px;">+ Lisää teksti</button>
        </div>
        <div class="form-group">
          <label>Linkit</label>
          <div id="formLinksContainer" class="dynamic-list"></div>
          <button type="button" class="btn btn-sm" id="btnAddLink" style="margin-top:4px;">+ Lisää linkki</button>
        </div>
        <!-- (Kuva-osio poistettu selainversiosta, koska lokaalien tiedostojen haku ei onnistu suojausten vuoksi) -->
        <hr style="border:none;border-top:1px solid var(--border-subtle);margin:16px 0;">
        <h3 style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;">Suhteet</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Isä</label>
            <div class="searchable-select" id="selFather" data-filter="M"></div>
          </div>
          <div class="form-group">
            <label>Äiti</label>
            <div class="searchable-select" id="selMother" data-filter="F"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Puoliso</label>
          <div class="searchable-select" id="selSpouse" data-filter=""></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btnModalCancel">Peruuta</button>
        <button class="btn btn-primary" id="btnModalSave">Tallenna</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
      <polyline points="22 4 12 14.01 9 11.01" />
    </svg>
    <span id="toastText"></span>
  </div>

  <script src="app.js?v=5"></script>
</body>

</html>
